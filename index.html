<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Result Calculator</title>

<style>

:root{
--primary:#4facfe;
--secondary:#00f2fe;
}

*{
box-sizing:border-box;
font-family:Segoe UI, Arial;
}

body{
margin:0;
background:linear-gradient(135deg,var(--primary),var(--secondary));
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
background:white;
width:100%;
max-width:420px;
padding:25px;
border-radius:14px;
box-shadow:0 15px 30px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

label{
font-weight:600;
font-size:14px;
margin-top:12px;
display:block;
}

input{
width:100%;
padding:12px;
margin-top:6px;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:20px;
border:none;
border-radius:10px;
background:#4facfe;
color:white;
font-size:17px;
cursor:pointer;
}

button:hover{
background:#2d8cf0;
}

.result{
margin-top:20px;
padding:18px;
background:#f6f8fb;
border-radius:10px;
font-size:18px;
text-align:center;
display:none;
}

</style>
</head>

<body>

<div class="card">

<h2>Result Percentage Calculator</h2>

<label>Grand Total Marks Obtained</label>
<input type="number" id="obtained" placeholder="Example: 289.9">

<label>Total Marks of Unit Tests (Both)</label>
<input type="number" id="unitTotal" placeholder="Example: 500">

<label>Total Marks of Half Yearly</label>
<input type="number" id="halfTotal" placeholder="Example: 400">

<label>Total Marks of Annual</label>
<input type="number" id="annualTotal" placeholder="Example: 400">

<button onclick="calculate()">Calculate Percentage</button>

<div class="result" id="result"></div>

</div>

<script>

function truncate(number, decimals){
let factor = Math.pow(10, decimals);
return Math.floor(number * factor) / factor;
}

function calculate(){

let obtained = parseFloat(document.getElementById("obtained").value) || 0;
let unitTotal = parseFloat(document.getElementById("unitTotal").value) || 0;
let halfTotal = parseFloat(document.getElementById("halfTotal").value) || 0;
let annualTotal = parseFloat(document.getElementById("annualTotal").value) || 0;

let full = (unitTotal * 0.20) + (halfTotal * 0.30) + (annualTotal * 0.50);

let percentage = (obtained / full) * 100;

/* cut decimal instead of rounding */
percentage = truncate(percentage,2);

let result = document.getElementById("result");
result.style.display = "block";
result.innerHTML = "Final Percentage: <b>"+percentage.toFixed(2)+"%</b>";

}

</script>

</body>
</html>
